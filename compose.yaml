services:
  iroh-be:
    container_name: c_dotnet_api
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "5034:5034"
    networks:
      - iroh-network

networks:
  iroh-network:
    external: true
    name: iroh_default
